plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jonathan.eyescroll'
    compileSdk 34
    defaultConfig {
        applicationId "com.jonathan.eyescroll"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.mlkit:face-detection:16.1.5'
}